---
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  # Keeps GitHub Actions and reusable workflow pins current, including
  # ansible-collections/partner-certification-checker in certification.yml
  # and pre-commit-tests.yml.
  # https://github.com/ansible-collections/partner-certification-checker#keep-the-workflow-updated
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
