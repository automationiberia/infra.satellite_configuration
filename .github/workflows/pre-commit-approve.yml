---
# Trusted workflow: approval gate for external PRs and .github changes.
# Does not checkout or execute PR code (no pwn-request risk).
# After approval, installs Automation Hub collections from the base branch and
# uploads them as an artifact for pre-commit-tests.yml (fork PRs have no secrets;
# pull_request_target cannot write Actions caches to the default branch scope).
name: pre-commit approval

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      github_modified: ${{ steps.filter.outputs.github }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Base branch only; paths-filter uses the GitHub API for PR file lists.
          sparse-checkout: .github

      - name: Check for modified .github files
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            github:
              - '.github/**'

  auto-approve:
    needs: check-changes
    if: >-
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) &&
      needs.check-changes.outputs.github_modified == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Trusted collaborator PR approved automatically
        run: echo "Trusted collaborator PR approved automatically."

  manual-approval:
    needs: check-changes
    if: >-
      !contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) ||
      needs.check-changes.outputs.github_modified == 'true'
    runs-on: ubuntu-latest
    environment: requires-approval
    steps:
      - name: Approval granted
        run: echo "Approval granted."

  prepare-collections:
    needs: [auto-approve, manual-approval]
    if: >-
      always() &&
      !cancelled() &&
      (needs.auto-approve.result == 'success' ||
       needs.manual-approval.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout base branch requirements only
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Base branch ref only; never check out or execute PR head.
          sparse-checkout: |
            .github/collections

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install Ansible
        run: pip install --upgrade "ansible-core>=2.20" pyyaml==6.0.1

      - name: Install required collections from Automation Hub
        run: ansible-galaxy collection install -r .github/collections/requirements.yml -vvvv
        env:
          ANSIBLE_GALAXY_SERVER_VALIDATED_URL: https://console.redhat.com/api/automation-hub/content/validated/
          ANSIBLE_GALAXY_SERVER_VALIDATED_TOKEN: ${{ secrets.CRC_PUBLISH_KEY }}
          ANSIBLE_GALAXY_SERVER_VALIDATED_AUTH_URL: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          ANSIBLE_GALAXY_SERVER_PUBLISHED_URL: https://console.redhat.com/api/automation-hub/content/published/
          ANSIBLE_GALAXY_SERVER_PUBLISHED_TOKEN: ${{ secrets.CRC_PUBLISH_KEY }}
          ANSIBLE_GALAXY_SERVER_PUBLISHED_AUTH_URL: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          ANSIBLE_GALAXY_SERVER_COMMUNITY_URL: https://galaxy.ansible.com/
          ANSIBLE_GALAXY_SERVER_LIST: published, validated, community

      - name: Upload collections artifact for pre-commit tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ansible-collections
          path: ~/.ansible/collections
          retention-days: 1
          if-no-files-found: error

...
