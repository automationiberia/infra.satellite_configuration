---
# Untrusted code execution: pull_request (fork PRs have no secrets).
# Pull request runs wait in approval-gate until pre-commit approval completes.
# If pull_request_target never starts (common for GITHUB_TOKEN-created PRs),
# approval-gate falls back to the in-workflow requires-approval environment gate.
# Push/schedule runs populate the Ansible collections cache for external PRs.
name: pre-commit tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - '*_'
      - devel
    tags:
      - '*_'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+[abrc]+[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+.dev[0-9]+'
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  approval-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      approved: ${{ steps.check.outputs.approved }}
      needs_manual: ${{ steps.check.outputs.needs_manual }}
      approval_run_id: ${{ steps.check.outputs.approval_run_id }}
    steps:
      - name: Wait for pre-commit approval workflow
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const pollIntervalMs = 30_000;
            // PRs opened by GITHUB_TOKEN (e.g. update-pre-commit) often never fire
            // pull_request_target; fall back to the in-workflow environment gate.
            const approvalStartGraceMs = 5 * 60 * 1000;
            const timeoutMs = 360 * 60 * 1000;
            const deadline = Date.now() + timeoutMs;
            const waitStartedAt = Date.now();
            const trustedAssociations = ['OWNER', 'MEMBER', 'COLLABORATOR'];

            const { owner, repo } = context.repo;
            const pullRequest = context.payload.pull_request;
            const headSha = pullRequest.head.sha;

            core.setOutput('needs_manual', 'false');
            core.setOutput('approval_run_id', '');

            if (pullRequest.base.ref !== 'devel') {
              core.setFailed(
                `Pull request #${pullRequest.number} targets ${pullRequest.base.ref}, expected devel`,
              );
              core.setOutput('approved', 'false');
              return;
            }

            async function getApprovalWorkflowId() {
              const { data } = await github.rest.actions.listRepoWorkflows({
                owner,
                repo,
                per_page: 100,
              });
              const workflow = data.workflows.find(
                (entry) => entry.path === '.github/workflows/pre-commit-approve.yml',
              );
              return workflow?.id;
            }

            async function pullRequestModifiesGithub() {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pullRequest.number,
                per_page: 100,
              });
              return files.some((file) => file.filename.startsWith('.github/'));
            }

            async function resolveInlineApproval(reason) {
              const trusted = trustedAssociations.includes(pullRequest.author_association);
              const githubModified = await pullRequestModifiesGithub();

              core.notice(reason, { title: 'CI approval gate' });

              if (trusted && !githubModified) {
                core.notice('Trusted collaborator PR approved automatically (inline).', {
                  title: 'CI approval gate',
                });
                core.setOutput('approved', 'true');
                return;
              }

              core.notice(
                'Manual approval required via the pre-commit tests environment gate.',
                { title: 'CI approval gate' },
              );
              core.setOutput('approved', 'false');
              core.setOutput('needs_manual', 'true');
            }

            async function getLatestApprovalRun(workflowId) {
              try {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflowId,
                  head_sha: headSha,
                  event: 'pull_request_target',
                  per_page: 5,
                });
                return data.workflow_runs[0];
              } catch (error) {
                if (error.status === 404) {
                  return undefined;
                }
                throw error;
              }
            }

            async function hasSuccessfulApprovalJob(runId) {
              const { data: jobsResponse } = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: runId,
              });
              return jobsResponse.jobs.find(
                (job) =>
                  (job.name === 'auto-approve' || job.name === 'manual-approval') &&
                  job.conclusion === 'success',
              );
            }

            const approvalWorkflowId = await getApprovalWorkflowId();
            if (!approvalWorkflowId) {
              await resolveInlineApproval(
                'pre-commit-approve.yml is not registered on the default branch yet; using inline approval rules.',
              );
              return;
            }

            while (Date.now() < deadline) {
              const approvalRun = await getLatestApprovalRun(approvalWorkflowId);

              if (!approvalRun) {
                if (Date.now() - waitStartedAt >= approvalStartGraceMs) {
                  await resolveInlineApproval(
                    'pre-commit approval workflow did not start for this head SHA; falling back to inline approval rules.',
                  );
                  return;
                }
                core.info('Waiting for pre-commit approval workflow to start...');
                await sleep(pollIntervalMs);
                continue;
              }

              if (approvalRun.status !== 'completed') {
                core.info(
                  `Waiting for pre-commit approval workflow ${approvalRun.id} (${approvalRun.status})...`,
                );
                await sleep(pollIntervalMs);
                continue;
              }

              if (approvalRun.conclusion !== 'success') {
                core.setFailed(
                  `pre-commit approval workflow ${approvalRun.id} concluded with ${approvalRun.conclusion}`,
                );
                core.setOutput('approved', 'false');
                return;
              }

              const approvalJob = await hasSuccessfulApprovalJob(approvalRun.id);
              if (!approvalJob) {
                core.setFailed(
                  `pre-commit approval workflow ${approvalRun.id} completed without a successful approval job`,
                );
                core.setOutput('approved', 'false');
                return;
              }

              core.notice(
                `Approved by ${approvalJob.name} in workflow run ${approvalRun.id}`,
                { title: 'CI approval gate' },
              );
              core.setOutput('approved', 'true');
              core.setOutput('approval_run_id', String(approvalRun.id));
              return;
            }

            core.setFailed('Timed out waiting for pre-commit approval workflow to complete');
            core.setOutput('approved', 'false');

  manual-approval:
    needs: approval-gate
    if: >-
      github.event_name == 'pull_request' &&
      needs.approval-gate.outputs.needs_manual == 'true'
    environment: requires-approval
    runs-on: ubuntu-latest
    steps:
      - name: Manual approval granted
        run: echo "Manual approval granted."

  changelog:
    needs: [approval-gate, manual-approval]
    if: >-
      always() &&
      !cancelled() &&
      github.event_name == 'pull_request' &&
      (needs.approval-gate.outputs.approved == 'true' ||
       needs.manual-approval.result == 'success')
    runs-on: ubuntu-latest
    name: Requires changelog
    steps:
      - name: Checkout the collection repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate changelog
        uses: ansible/ansible-content-actions/.github/actions/ansible_validate_changelog@main

  pre-commit:
    needs: [approval-gate, manual-approval]
    if: >-
      always() &&
      !cancelled() &&
      !contains(fromJSON('["failure", "cancelled"]'), needs.approval-gate.result) &&
      !contains(fromJSON('["failure", "cancelled"]'), needs.manual-approval.result) &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       (github.event_name == 'pull_request' &&
        (needs.approval-gate.outputs.approved == 'true' ||
         needs.manual-approval.result == 'success')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install Ansible
        run: pip install --upgrade "ansible-core>=2.20" pyyaml==6.0.1

      - name: Restore collections from approval artifact
        id: restore_collections
        if: >-
          github.event_name == 'pull_request' &&
          needs.approval-gate.outputs.approval_run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ansible-collections
          path: ${{ runner.temp }}/ansible-collections
          repository: ${{ github.repository }}
          run-id: ${{ needs.approval-gate.outputs.approval_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install restored collections into Ansible path
        id: install_restored
        if: steps.restore_collections.outcome == 'success'
        run: |
          mkdir -p "${HOME}/.ansible/collections"
          cp -a "${{ runner.temp }}/ansible-collections/." "${HOME}/.ansible/collections/"
          ansible-galaxy collection list

      - name: Install collection dependencies from Automation Hub
        id: install_deps
        if: steps.install_restored.outcome != 'success'
        run: |
          if [ -z "${ANSIBLE_GALAXY_SERVER_PUBLISHED_TOKEN}" ]; then
            echo "::error::No approval collections artifact and CRC_PUBLISH_KEY is unavailable."
            echo "::error::Fork PRs need prepare-collections in pre-commit-approve.yml on the base branch."
            exit 1
          fi
          ansible-galaxy collection install -r .github/collections/requirements.yml -vvvv
        env:
          ANSIBLE_GALAXY_SERVER_VALIDATED_URL: https://console.redhat.com/api/automation-hub/content/validated/
          ANSIBLE_GALAXY_SERVER_VALIDATED_TOKEN: ${{ secrets.CRC_PUBLISH_KEY }}
          ANSIBLE_GALAXY_SERVER_VALIDATED_AUTH_URL: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          ANSIBLE_GALAXY_SERVER_PUBLISHED_URL: https://console.redhat.com/api/automation-hub/content/published/
          ANSIBLE_GALAXY_SERVER_PUBLISHED_TOKEN: ${{ secrets.CRC_PUBLISH_KEY }}
          ANSIBLE_GALAXY_SERVER_PUBLISHED_AUTH_URL: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          ANSIBLE_GALAXY_SERVER_COMMUNITY_URL: https://galaxy.ansible.com/
          ANSIBLE_GALAXY_SERVER_LIST: published, validated, community

      - name: Install this collection
        run: |
          if [ "${{ steps.install_restored.outcome }}" = "success" ]; then
            ansible-galaxy collection install . --no-deps -vvvv
          else
            ansible-galaxy collection install . -vvvv
          fi
        env:
          ANSIBLE_GALAXY_SERVER_VALIDATED_URL: https://console.redhat.com/api/automation-hub/content/validated/
          ANSIBLE_GALAXY_SERVER_VALIDATED_TOKEN: ${{ secrets.CRC_PUBLISH_KEY }}
          ANSIBLE_GALAXY_SERVER_VALIDATED_AUTH_URL: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          ANSIBLE_GALAXY_SERVER_PUBLISHED_URL: https://console.redhat.com/api/automation-hub/content/published/
          ANSIBLE_GALAXY_SERVER_PUBLISHED_TOKEN: ${{ secrets.CRC_PUBLISH_KEY }}
          ANSIBLE_GALAXY_SERVER_PUBLISHED_AUTH_URL: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          ANSIBLE_GALAXY_SERVER_COMMUNITY_URL: https://galaxy.ansible.com/
          ANSIBLE_GALAXY_SERVER_LIST: published, validated, community
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  build-import:
    needs: [approval-gate, manual-approval]
    if: >-
      always() &&
      !cancelled() &&
      !contains(fromJSON('["failure", "cancelled"]'), needs.approval-gate.result) &&
      !contains(fromJSON('["failure", "cancelled"]'), needs.manual-approval.result) &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       (github.event_name == 'pull_request' &&
        (needs.approval-gate.outputs.approved == 'true' ||
         needs.manual-approval.result == 'success')))
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@main

  markdown-link-check:
    needs: [approval-gate, manual-approval]
    if: >-
      always() &&
      !cancelled() &&
      !contains(fromJSON('["failure", "cancelled"]'), needs.approval-gate.result) &&
      !contains(fromJSON('["failure", "cancelled"]'), needs.manual-approval.result) &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       (github.event_name == 'pull_request' &&
        (needs.approval-gate.outputs.approved == 'true' ||
         needs.manual-approval.result == 'success')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225 # v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          check-modified-files-only: "yes"
          config-file: .mlc_config.json
          base-branch: devel

  all_green:
    if: >-
      always() &&
      !cancelled() &&
      needs.pre-commit.result != 'skipped'
    needs:
      - pre-commit
      - build-import
      - markdown-link-check
    runs-on: ubuntu-latest
    steps:
      - run: >-
          python -c "assert set([
          '${{ needs.pre-commit.result }}',
          '${{ needs.build-import.result }}',
          '${{ needs.markdown-link-check.result }}',
          ]) == {'success'}"

...
