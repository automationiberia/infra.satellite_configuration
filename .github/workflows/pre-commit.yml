---
# This workflow action will run pre-commit, which will execute ansible and yaml linting
# See .pre-commit-config.yaml for what hooks are executed
name: pre-commit tests

permissions:
  contents: read

on:
  push:
    branches:
      - '*_'  # ending underscore for trying things
      - devel
    tags:
      - '*_'  # ending underscore for trying things
      - 'v[0-9]+.[0-9]+.[0-9]+'  # final version
      - 'v[0-9]+.[0-9]+.[0-9]+[abrc]+[0-9]+'  # alpha, beta, release candidate (rc)
      - 'v[0-9]+.[0-9]+.[0-9]+.dev[0-9]+'  # development versions
  pull_request_target:
  schedule:
    - cron: "0 6 * * *"

jobs:
  approve_run:
    environment: requires-approval
    runs-on: ubuntu-latest
    steps:
      - run: echo "Approval granted. Proceeding to reusable workflow."

  pre-commit_and_sanity:
    needs: approve_run
    uses: "redhat-cop/ansible_collections_tooling/.github/workflows/pre_commit_workflow_crc.yml@main"
    with:
      collection_namespace: infra
      collection_name: satellite_configuration
      collection_version: 1.1.0
      collection_repo: https://github.com/redhat-cop/infra.satellite_configuration.git
      base_branch: devel
      collection_dependencies: redhat.satellite
    secrets:
      ansible_ah_token: ${{ secrets.CRC_PUBLISH_KEY }}

...
