---
# Pre-commit, changelog validation, build-import, and markdown link checks.
# See .pre-commit-config.yaml for hook definitions.
name: pre-commit tests

permissions:
  contents: read

on:
  push:
    branches:
      - '*_'  # ending underscore for trying things
      - devel
    tags:
      - '*_'  # ending underscore for trying things
      - 'v[0-9]+.[0-9]+.[0-9]+'  # final version
      - 'v[0-9]+.[0-9]+.[0-9]+[abrc]+[0-9]+'  # alpha, beta, release candidate (rc)
      - 'v[0-9]+.[0-9]+.[0-9]+.dev[0-9]+'  # development versions
  pull_request_target:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  approve_run:
    environment: requires-approval
    runs-on: ubuntu-latest
    steps:
      - run: echo "Approval granted. Proceeding to CI jobs."

  changelog:
    needs: approve_run
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    uses: ansible/ansible-content-actions/.github/workflows/changelog.yaml@main

  pre-commit:
    needs: approve_run
    environment: requires-approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Ansible
        run: pip install --upgrade "ansible-core>=2.20" pyyaml==6.0.1
      - name: Install redhat.satellite dependency
        run: ansible-galaxy collection install -r .github/collections/requirements.yml -vvv
        env:
          ANSIBLE_GALAXY_SERVER_LIST: certified,galaxy
          ANSIBLE_GALAXY_SERVER_CERTIFIED_URL: https://console.redhat.com/api/automation-hub/content/published/
          ANSIBLE_GALAXY_SERVER_CERTIFIED_AUTH_URL: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          ANSIBLE_GALAXY_SERVER_CERTIFIED_TOKEN: ${{ secrets.CRC_PUBLISH_KEY }}
          ANSIBLE_GALAXY_SERVER_GALAXY_URL: https://galaxy.ansible.com/api/
      - name: Link collection into ansible_collections path
        run: |
          mkdir -p ~/.ansible/collections/ansible_collections/infra/
          ln -sfn "${GITHUB_WORKSPACE}" ~/.ansible/collections/ansible_collections/infra/satellite_configuration
      - uses: pre-commit/action@v3.0.1
        env:
          ANSIBLE_GALAXY_SERVER_LIST: certified,galaxy
          ANSIBLE_GALAXY_SERVER_CERTIFIED_URL: https://console.redhat.com/api/automation-hub/content/published/
          ANSIBLE_GALAXY_SERVER_CERTIFIED_AUTH_URL: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
          ANSIBLE_GALAXY_SERVER_CERTIFIED_TOKEN: ${{ secrets.CRC_PUBLISH_KEY }}
          ANSIBLE_GALAXY_SERVER_GALAXY_URL: https://galaxy.ansible.com/api/

  build-import:
    needs: approve_run
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@main

  markdown-link-check:
    needs: approve_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: tcort/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          check-modified-files-only: 'yes'
          config-file: '.mlc_config.json'
          base-branch: devel

  all_green:
    if: ${{ always() }}
    needs:
      - pre-commit
      - build-import
      - markdown-link-check
      - changelog
    runs-on: ubuntu-latest
    steps:
      - run: >-
          python -c "import sys; results = {
            'pre-commit': '${{ needs.pre-commit.result }}',
            'build-import': '${{ needs.build-import.result }}',
            'markdown-link-check': '${{ needs.markdown-link-check.result }}',
            'changelog': '${{ needs.changelog.result }}',
          }; failed = [k for k, v in results.items() if v not in ('success', 'skipped')];
          print(results);
          sys.exit(1 if failed else 0)"
