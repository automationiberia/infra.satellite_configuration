---
repos:
  - repo: "https://github.com/pre-commit/pre-commit-hooks"
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: "https://github.com/ansible/ansible-lint.git"
    rev: v26.4.0
    hooks:
      # see discussions here about what arguments are used, and behavior
      # https://github.com/ansible/ansible-lint/issues/649
      # Roles will trigger an "unknown file type"
      # https://github.com/ansible/ansible-lint/issues/808
      - id: ansible-lint
        pass_filenames: false
        always_run: true
        # entry: "python3 -m ansiblelint -v --force-color"
        entry: "ansible-lint"
        language: python
        language_version: python3.14
        args:
          - "--profile=production"
        # additional_dependencies:
        #   - "ansible-core>=2.20."
        #   - "yamllint>=1.26,<2.0"
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
  - repo: local
    hooks:
      - id: unit-tests
        name: unit-tests
        entry: pytest -q tests/unit
        language: python
        additional_dependencies:
          - pytest
          - ansible-core==2.20.0
          - PyYAML
        pass_filenames: false
        always_run: true
  - repo: https://github.com/ambv/black
    rev: 26.5.1
    hooks:
      - id: black
        name: black
        entry: black
        args: [--config=.black.cfg, --check, --diff]
        types: [python]
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        name: flake8
        entry: flake8
        types: [python]
...
