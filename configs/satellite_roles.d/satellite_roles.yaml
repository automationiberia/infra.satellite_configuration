---
satellite_roles:
  - name: "ImageDeploymentEditor"
    description: "Managed by Ansible (ADR 0002). Strict resource type separation to comply with API requirements."
    organizations:
      - "datacenter"
    locations:
      - "Onda"
    filters:
      - permissions:
          - "view_hostgroups"
          - "edit_hostgroups"
        search: "name ~ \"Onda Host Group%\""

      - permissions:
          - "view_hosts"
          - "edit_hosts"
        search: "hostgroup_title ~ \"Onda Host Group%\""

      - permissions:
          - "view_host_collections"
          - "edit_host_collections"
        search: "name ~ \"Onda%\""

      - permissions:
          - "view_provisioning_templates"
          - "create_provisioning_templates"
          - "edit_provisioning_templates"
          - "destroy_provisioning_templates"
        search: "name ~ \"IMG-%\""

      - permissions:
          - "view_ptables"
          - "create_ptables"
          - "edit_ptables"
          - "destroy_ptables"
        search: "name ~ \"IMG-%\""

      - permissions:
          - "view_params"
          - "create_params"
          - "edit_params"
          - "destroy_params"
        search: "name ~ \"IMG-%\""

      - permissions:
          - "view_webhooks"
          - "create_webhooks"
          - "edit_webhooks"
          - "destroy_webhooks"
        search: "name ~ \"IMG-%\""

      - permissions:
          - "view_models"

      - permissions:
          - "view_architectures"
          - "create_architectures"
          - "edit_architectures"
          - "destroy_architectures"

      - permissions:
          - "view_operatingsystems"
          - "create_operatingsystems"
          - "edit_operatingsystems"
          - "destroy_operatingsystems"

      - permissions:
          - "view_media"
          - "create_media"
          - "edit_media"
          - "destroy_media"

      - permissions:
          - "view_images"
          - "create_images"
          - "edit_images"
          - "destroy_images"
  - name: "ImageDeploymentEditor2"
    description: "Expanded to include complete template syncs, metadata views, and webhooks. Deployment handed off to Operators."
    organizations:
      - "datacenter"
    locations:
      - "Onda"
    filters:
      - permissions:
          - "view_hostgroups"
          - "edit_hostgroups"
        search: "name ~ \"Onda Host Group%\""

      - permissions:
          - "view_hosts"
          - "edit_hosts"
        search: "hostgroup_title ~ \"Onda Host Group%\""

      - permissions:
          - "view_host_collections"
          - "edit_host_collections"
        search: "name ~ \"Onda%\""

      - permissions:
          - "view_provisioning_templates"
          - "create_provisioning_templates"
          - "edit_provisioning_templates"
          - "destroy_provisioning_templates"
        search: "name ~ \"IMG-%\""

      - permissions:
          - "view_ptables"
          - "create_ptables"
          - "edit_ptables"
          - "destroy_ptables"
        search: "name ~ \"IMG-%\""

      - permissions:
          - "view_params"
        search: "name ~ IMG-%"
  - name: "clone1"
    description: "Expanded to include complete template syncs, metadata views, and webhooks. Deployment handed off to Operators."
    organizations:
      - "datacenter"
    locations:
      - "Onda"
    filters:
      - permissions:
          - "view_hostgroups"
          - "edit_hostgroups"
        search: "name ~ \"Onda Host Group%\""

      - permissions:
