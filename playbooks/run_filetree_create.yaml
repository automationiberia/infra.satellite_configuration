---
- name: Export Satellite Configuration
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Ensure that the output_path exists
      ansible.builtin.file:
        path: "{{ output_path }}"
        mode: "0777"
        state: directory
      tags: always

    - name: Get Satellite Objects
      ansible.builtin.import_role:
        # Resolve sibling roles/ from this playbook (git checkout or installed collection layout).
        name: "{{ [playbook_dir | dirname, 'roles', 'filetree_create'] | path_join }}"
...
