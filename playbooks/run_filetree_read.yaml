---
- name: Resolve Satellite connection for import
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Resolve satellite from satellite_target
      ansible.builtin.set_fact:
        satellite: "{{ satellite_target }}"
      when: satellite_target is defined

    - name: Ensure satellite connection is defined
      ansible.builtin.assert:
        that:
          - satellite is defined
          - satellite.server_url is defined
          - satellite.admin is defined
        fail_msg: >-
          Define satellite_target (preferred for round-trip) or satellite before
          running the import playbook.

- name: Import Satellite configuration from filetree
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - infra.satellite_configuration
    - redhat.satellite
  vars:
    satellite_configuration_filetree_path: configs
  module_defaults:
    group/redhat.satellite.satellite:
      username: "{{ satellite.admin.username }}"
      password: "{{ satellite.admin.password }}"
      server_url: "{{ satellite.server_url }}"
      validate_certs: "{{ satellite.validate_certs }}"
  tasks:
    - name: Load Satellite configuration from filetree
      ansible.builtin.import_role:
        name: infra.satellite_configuration.filetree_read

    - name: Apply Satellite configuration
      ansible.builtin.import_role:
        name: infra.satellite_configuration.dispatch
...
