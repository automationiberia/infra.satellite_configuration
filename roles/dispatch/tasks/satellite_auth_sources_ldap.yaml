---
- name: Dispatch | Sanitize Auth Sources LDAP for Active Directory
  ansible.builtin.set_fact:
    __satellite_auth_sources_ldap_for_role: "{{ __satellite_auth_sources_ldap_for_role | default([]) + [__auth_source_entry] }}"
  loop: "{{ satellite_auth_sources_ldap | default([]) }}"
  loop_control:
    loop_var: __auth_source_item
    label: "{{ __auth_source_item.name | default(__auth_source_item.host) }}"
  vars:
    __auth_source_entry: >-
      {{
        (__auth_source_item | dict2items | rejectattr('key', 'equalto', 'use_netgroups') | items2dict)
        if (__auth_source_item.server_type | default('')) == 'active_directory'
        else __auth_source_item
      }}
  when: satellite_auth_sources_ldap | default([]) | length > 0
  no_log: "{{ satellite_configuration_dispatch_secure_logging }}"

- name: Dispatch | Apply Auth Sources LDAP
  ansible.builtin.import_role:
    name: redhat.satellite.auth_sources_ldap
  vars:
    satellite_username: "{{ username }}"
    satellite_password: "{{ password }}"
    satellite_server_url: "{{ server_url }}"
    satellite_validate_certs: "{{ validate_certs }}"
    satellite_auth_sources_ldap: "{{ __satellite_auth_sources_ldap_for_role | default(satellite_auth_sources_ldap | default([])) }}"
  no_log: "{{ satellite_configuration_dispatch_secure_logging }}"
...
