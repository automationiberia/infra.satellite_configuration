---
- name: Resolve operating system titles on target Satellite
  ansible.builtin.include_tasks: satellite_operatingsystem_title_lookup.yaml
  when: satellite_installation_mediums is defined

- name: Associate Installation Mediums with Operating Systems
  redhat.satellite.installation_medium:
    name: "{{ __current_installation_medium.name }}"
    operatingsystems: "{{ __resolved_installation_medium_operatingsystems }}"
    state: present
  vars:
    __resolved_installation_medium_operatingsystems: >-
      {%- set titles = [] -%}
      {%- for __os_ref in __current_installation_medium.operatingsystems | default([]) -%}
      {%- if __os_ref is mapping and __os_ref.name is defined and __os_ref.major is defined and __os_ref.minor is defined -%}
      {%- set __os_key = __os_ref.name ~ '|' ~ __os_ref.major ~ '|' ~ __os_ref.minor -%}
      {%- set _ = titles.append(__dispatch_operatingsystem_titles[__os_key] | default(__os_ref.name ~ ' ' ~ __os_ref.major ~ '.' ~ __os_ref.minor)) -%}
      {%- else -%}
      {%- set _ = titles.append(__os_ref) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ titles }}
  loop: "{{ satellite_installation_mediums | default([]) }}"
  loop_control:
    loop_var: __current_installation_medium
    label: "{{ __current_installation_medium.name }}"
  when:
    - satellite_installation_mediums is defined
    - __current_installation_medium.operatingsystems is defined
    - __current_installation_medium.operatingsystems | length > 0
  delegate_to: localhost
...
