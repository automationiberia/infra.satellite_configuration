---
# Capture play-level defaults in a separate vars scope so include_role vars can
# assign satellite_manifest_download / satellite_rhsm_* without self-reference recursion.
- name: Dispatch | Upload subscription manifests
  when: __dispatch_manifest_items | default([]) | length > 0
  vars:
    __manifest_download_default: "{{ satellite_manifest_download | default(false) }}"
    __manifest_rhsm_username_default: "{{ satellite_rhsm_username | default(omit) }}"
    __manifest_rhsm_password_default: "{{ satellite_rhsm_password | default(omit) }}"
  block:
    - name: Dispatch | Upload Subscription Manifest
      ansible.builtin.include_role:
        name: redhat.satellite.manifest
      vars:
        satellite_username: "{{ satellite.admin.username }}"
        satellite_password: "{{ satellite.admin.password }}"
        satellite_server_url: "{{ satellite.server_url }}"
        satellite_validate_certs: "{{ satellite.validate_certs }}"
        satellite_organization: "{{ __current_manifest.organization | default(__current_manifest.name) }}"
        satellite_manifest_path: "{{ __current_manifest.path }}"
        satellite_manifest_download: "{{ __current_manifest.manifest_download | default(__manifest_download_default) }}"
        satellite_manifest_uuid: "{{ __current_manifest.manifest_uuid | default(omit) }}"
        satellite_rhsm_username: "{{ __current_manifest.rhsm_username | default(__manifest_rhsm_username_default) | default(omit) }}"
        satellite_rhsm_password: "{{ __current_manifest.rhsm_password | default(__manifest_rhsm_password_default) | default(omit) }}"
      loop: "{{ __dispatch_manifest_items }}"
      loop_control:
        loop_var: __current_manifest
        label: "{{ __current_manifest.organization | default(__current_manifest.name) }}"
...
