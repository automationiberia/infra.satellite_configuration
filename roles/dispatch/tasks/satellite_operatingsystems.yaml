---
- name: Dispatch | Resolve operating systems for current phase
  ansible.builtin.set_fact:
    _satellite_operatingsystems_dispatch: >-
      {{
        (satellite_operatingsystems | default([]))
        | map('combine', {'media': omit}, recursive=True)
        | list
        if (__dispatch_operatingsystems_phase | default('create') == 'create')
        else (satellite_operatingsystems | default([]))
      }}
  when: satellite_operatingsystems is defined

- name: Create OperatingSystems
  ansible.builtin.import_role:
    name: redhat.satellite.operatingsystems
  vars:
    # Use the resolved list only — do not default to satellite_operatingsystems here
    # (same-name assignment in import_role vars causes Jinja self-reference recursion).
    satellite_operatingsystems: "{{ _satellite_operatingsystems_dispatch }}"
    satellite_username: "{{ username }}"
    satellite_password: "{{ password }}"
    satellite_server_url: "{{ server_url }}"
    satellite_validate_certs: "{{ validate_certs }}"
  when: _satellite_operatingsystems_dispatch is defined
...
