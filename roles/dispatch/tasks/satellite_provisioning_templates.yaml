---
- name: Build unlocked provisioning templates for dispatch
  ansible.builtin.set_fact:
    __dispatch_provisioning_templates: >-
      {%- set __unlocked_provisioning_templates = [] -%}
      {%- for __pt in satellite_provisioning_templates | default([]) -%}
      {%-   if not (__pt.locked | default(false) | bool) -%}
      {%-     set _ = __unlocked_provisioning_templates.append(__pt) -%}
      {%-   endif -%}
      {%- endfor -%}
      {{ __unlocked_provisioning_templates }}
  when: satellite_provisioning_templates is defined

- name: Create/Update Provisioning Template Snippets
  redhat.satellite.provisioning_template:
    name: "{{ __current_provisioning_template.name }}"
    template: "{{ __current_provisioning_template.template | infra.satellite_configuration.satellite_configuration_unwrap_raw_markers }}"
    kind: snippet
    locked: "{{ __current_provisioning_template.locked | default(omit) }}"
    organizations: "{{ __current_provisioning_template.organizations | default(omit) }}"
    locations: "{{ __current_provisioning_template.locations | default(omit) }}"
    updated_name: "{{ __current_provisioning_template.updated_name | default(omit) }}"
    state: "{{ __current_provisioning_template.state | default('present') }}"
  loop: "{{ __dispatch_provisioning_templates | default([]) }}"
  loop_control:
    loop_var: __current_provisioning_template
    label: "{{ __current_provisioning_template.name }}"
  when:
    - satellite_provisioning_templates is defined
    - __current_provisioning_template.snippet | default(false) | bool
  delegate_to: localhost

- name: Create/Update Provisioning Templates
  redhat.satellite.provisioning_template:
    # Mandatory params
    name: "{{ __current_provisioning_template.name }}"
    template: "{{ __current_provisioning_template.template | infra.satellite_configuration.satellite_configuration_unwrap_raw_markers }}"
    # Optional params
    locked: "{{ __current_provisioning_template.locked | default(omit) }}"
    organizations: "{{ __current_provisioning_template.organizations | default(omit) }}"
    locations: "{{ __current_provisioning_template.locations | default(omit) }}"
    kind: "{{ __current_provisioning_template.kind | default(omit) }}"
    operatingsystems: "{{ omit if (__dispatch_provisioning_templates_phase | default('create') == 'create') else (__current_provisioning_template.operatingsystems | default(omit)) }}"
    updated_name: "{{ __current_provisioning_template.updated_name | default(omit) }}"
    state: "{{ __current_provisioning_template.state | default('present') }}"
  loop: "{{ __dispatch_provisioning_templates | default([]) }}"
  loop_control:
    loop_var: __current_provisioning_template
    label: "{{ __current_provisioning_template.name }}"
  when:
    - satellite_provisioning_templates is defined
    - not (__current_provisioning_template.snippet | default(false) | bool)
  delegate_to: localhost
...
