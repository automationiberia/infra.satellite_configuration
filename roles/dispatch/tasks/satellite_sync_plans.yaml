---
- name: Dispatch | Resolve custom product names for sync plan associations
  ansible.builtin.set_fact:
    __dispatch_sync_plan_product_names: >-
      {{
        (
          (satellite_products | default([]))
          | rejectattr('redhat', 'defined')
          | list
          + (
            (satellite_products | default([]))
            | selectattr('redhat', 'defined')
            | rejectattr('redhat', 'equalto', true)
            | rejectattr('redhat', 'equalto', True)
            | rejectattr('redhat', 'equalto', 1)
            | list
          )
          if (
            satellite_configuration_dispatch_products_skip_provider_managed | default(true) | bool
          )
          else (satellite_products | default([]))
        )
        | map(attribute='name')
        | list
        | unique
      }}
  when:
    - satellite_sync_plans is defined
    - __dispatch_sync_plans_phase | default('initial') == 'products'

- name: Create Sync Plans
  redhat.satellite.sync_plan:
    name: "{{ __current_sync_plan.name }}"
    interval: "{{ __current_sync_plan.interval }}"
    enabled: "{{ __current_sync_plan.enabled }}"
    sync_date: "{{ __current_sync_plan.sync_date }}"
    organization: "{{ __current_sync_plan.organization }}"
    description: "{{ __current_sync_plan.description | default(omit) }}"
    cron_expression: "{{ __current_sync_plan.cron_expression | default(omit) }}"
    products: >-
      {{
        omit
        if (__dispatch_sync_plans_phase | default('initial') == 'initial')
        else (
          (
            __current_sync_plan.products | default([])
            | intersect(__dispatch_sync_plan_product_names | default([]))
            | list
          )
          if (
            (__current_sync_plan.products | default([])
            | intersect(__dispatch_sync_plan_product_names | default([]))
            | list | length) > 0
          )
          else omit
        )
      }}
    state: present
  loop: "{{ satellite_sync_plans }}"
  loop_control:
    loop_var: __current_sync_plan
    label: "{{ __current_sync_plan.name }}"
  when: satellite_sync_plans is defined
  delegate_to: localhost
...
