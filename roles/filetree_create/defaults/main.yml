---
# defaults file for filetree_create
#
# Role-private defaults use filetree_create_ prefix by convention.
# Public play/CaC interface vars below use satellite_configuration_* / play names;
# var-naming[no-role-prefix] is skipped in .ansible-lint (strict mode).

# Foreman/Satellite built-in role names (see role global_vars).
# Override the whole list if needed, or append via filetree_create_roles_name_excludes_extra.
filetree_create_roles_name_excludes: "{{ satellite_builtin_role_name_skips }}"
filetree_create_roles_name_excludes_extra: "{{ satellite_builtin_role_name_skips_extra }}"

###################
## Public interface
###################
# Play-facing export path alias (documented); prefer satellite_configuration_filetree_path.
output_path: "{{ satellite_configuration_filetree_path }}"
# Optional (set under satellite.template in your vars): set_ownership: true applies owner/group on
# generated files. Default is false so exports work as a normal local user without chown to another UID.
set_ownership: false

satellite_configuration_filetree_create_secure_logging: true

# Omit subscription/provider-managed products from export (Katello search redhat=false).
# The products index API omits redhat/provider_name; template-side checks alone are insufficient.
satellite_configuration_filetree_export_skip_provider_products: true

# Optional IPs, short names, or alternate FQDNs for installation-medium path normalization.
satellite_configuration_export_source_aliases: []
...
