---
- name: Auth Source LDAPs | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}

- name: Auth Source LDAPs | Get Info
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Auth Source LDAPs
    api_link: /api/auth_source_ldaps?per_page=all

- name: Auth Source LDAPs | Get Detailed Info
  when: result_api_response.json.results | default([]) | length > 0
  ansible.builtin.include_tasks: detailed_api_call.yaml
  vars:
    call_type: Auth Source LDAPs
    api_link: /api/auth_source_ldaps/
    loop_var: "{{ result_api_response.json.results | sort(attribute='id') }}"

- name: Auth Source LDAPs | No LDAP sources to detail
  when: result_api_response.json.results | default([]) | length == 0
  ansible.builtin.set_fact:
    detailed_info:
      results: []

- name: Auth Source LDAPs | Build export list
  when: detailed_info.results is defined and detailed_info.results | length > 0
  ansible.builtin.set_fact:
    info_list: []

- name: Auth Source LDAPs | Append LDAP export item
  when: detailed_info.results is defined and detailed_info.results | length > 0
  ansible.builtin.set_fact:
    info_list: "{{ info_list + [__ldap_export_item] }}"
  loop: "{{ detailed_info.results | map(attribute='json') | list }}"
  loop_control:
    loop_var: __ldap_item
    label: "{{ __ldap_item.name | default(__ldap_item.id) }}"
  vars:
    __ldap_export_item: >-
      {{
        __ldap_item
        | combine({'account_password': filetree_create_auth_sources_ldap_account_passwords[__ldap_item.name]}, recursive=true)
        if (__ldap_item.name in filetree_create_auth_sources_ldap_account_passwords)
        else __ldap_item
      }}
  no_log: >-
    {{
      satellite_configuration_filetree_create_secure_logging
      and (filetree_create_auth_sources_ldap_account_passwords | length > 0)
    }}

- name: Auth Source LDAPs | Template Out Results
  when: info_list is defined and info_list | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_auth_sources_ldap
  no_log: "{{ satellite_configuration_filetree_create_secure_logging and (filetree_create_auth_sources_ldap_account_passwords | length > 0) }}"
...
