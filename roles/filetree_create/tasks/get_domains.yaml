---
- name: Domains | Get Info
  redhat.satellite.domain_info:
    server_url: "{{ satellite.server_url }}"
    username: "{{ satellite.admin.username }}"
    password: "{{ satellite.admin.password }}"
    validate_certs: "{{ satellite.validate_certs }}"
  register: __domain_result_api_response

- name: Domains | Set Info List
  ansible.builtin.set_fact:
    info_list: "{{ __domain_result_api_response.domains | sort(attribute='id') }}"

- name: Domains | Enrich with host parameters
  ansible.builtin.include_tasks: enrich_info_list_parameters.yaml
  vars:
    __parameter_entity_api_path: domains
    __parameter_info_list_var: info_list
    __parameter_entity_label: domains

- name: Domains | Record hidden parameters for vault template
  ansible.builtin.include_tasks: record_hidden_parameters_for_vault.yaml
  vars:
    __record_hidden_results: "{{ info_list | default([]) }}"
    __record_hidden_vault_fact: satellite_configuration_vault_template_domain_parameters
    __record_hidden_entity_label: domain

- name: Domains | Template Out Results
  when:
    - info_list is defined
    - info_list | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_domains
...
