---
- name: Host Groups | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}

- name: Host Groups | Get Basic Info
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Host Groups
    api_link: /api/hostgroups?per_page=all

- name: Host Groups | Create a List
  ansible.builtin.set_fact:
    all_results: "{{ result_api_response.json.results | sort(attribute='id') }}"

- name: Host Groups | Get Detailed Info
  ansible.builtin.include_tasks: detailed_api_call.yaml
  vars:
    call_type: Host Groups
    api_link: /api/hostgroups/
    api_query: "?show_hidden_parameters=true"
    loop_var: "{{ all_results }}"

- name: Host Groups | Record hidden parameters for vault template
  ansible.builtin.include_tasks: record_hidden_parameters_for_vault.yaml
  vars:
    __record_hidden_results: "{{ detailed_info.results | default([]) }}"
    __record_hidden_vault_fact: satellite_configuration_vault_template_hostgroup_parameters
    __record_hidden_entity_label: host group

- name: Host Groups | Template Out Results
  when:
    - detailed_info is defined
    - detailed_info | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_hostgroups
...
