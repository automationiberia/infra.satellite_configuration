---
- name: Job Template (Do Work) | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}

- name: Job Template (Do Work) | Get Job Template
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Job Template (Do Work)
    api_link: "/api/job_templates/{{ __current_job_template.id }}/"

- name: Job Template (Do Work) | Retain Job Template detail
  ansible.builtin.set_fact:
    __job_template_detail: "{{ result_api_response.content | from_json }}"

- name: Job Template (Do Work) | Get full Template Input details
  when: __job_template_detail.template_inputs | default([]) | length > 0
  ansible.builtin.uri:
    method: GET
    url: "{{ satellite.server_url }}/api/templates/{{ __current_job_template.id }}/template_inputs/{{ __current_template_input.id }}"
    user: "{{ satellite.admin.username }}"
    password: "{{ satellite.admin.password }}"
    validate_certs: "{{ satellite.validate_certs }}"
    force_basic_auth: true
    return_content: true
    timeout: 1200
  loop: "{{ __job_template_detail.template_inputs | default([]) }}"
  loop_control:
    loop_var: __current_template_input
    label: "{{ __current_template_input.name | default(__current_template_input.id) }}"
  register: __template_inputs_detail

- name: Job Template (Do Work) | Append Job Template to info list
  when: __job_template_detail is defined
  ansible.builtin.set_fact:
    __rs_info_list: >-
      {{
        __rs_info_list
        + [
            __job_template_detail
            | combine({
                'template_inputs': (
                  __template_inputs_detail.results | default([])
                  | selectattr('json', 'defined')
                  | map(attribute='json')
                  | list
                  if (__template_inputs_detail is defined and (__template_inputs_detail.results | default([]) | length) > 0)
                  else (__job_template_detail.template_inputs | default([]))
                )
              })
          ]
      }}
...
