---
- name: Locations | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}

- name: Locations | Get Info
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Locations
    api_link: /api/v2/locations?per_page=all

- name: Locations | Set Info List
  ansible.builtin.set_fact:
    info_list: "{{ result_api_response.json.results | sort(attribute='id') | rejectattr('name', '==', 'Default Location') }}"

- name: Locations | Enrich with host parameters
  ansible.builtin.include_tasks: enrich_info_list_parameters.yaml
  vars:
    __parameter_entity_api_path: locations
    __parameter_info_list_var: info_list
    __parameter_entity_label: locations

- name: Locations | Record hidden parameters for vault template
  ansible.builtin.include_tasks: record_hidden_parameters_for_vault.yaml
  vars:
    __record_hidden_results: "{{ info_list | default([]) }}"
    __record_hidden_vault_fact: satellite_configuration_vault_template_location_parameters
    __record_hidden_entity_label: location

- name: Locations | Template Out Results
  when:
    - info_list is defined
    - info_list | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_locations

