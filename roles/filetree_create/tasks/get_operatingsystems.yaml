---
- name: Operating Systems | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}
    __rs_info_list: []

- name: Operating Systems | Get Operating Systems
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Operating Systems
    api_link: "/api/operatingsystems?per_page=all"

- name: Operating Systems | Retain the Operating Systems' info
  ansible.builtin.set_fact:
    __operatingsystems_list: "{{ result_api_response.json.results }}"

- name: Operating Systems | Get External Operating Systems Info
  ansible.builtin.include_tasks: get_operatingsystems_do_work.yaml
  loop: "{{ __operatingsystems_list }}"
  loop_control:
    loop_var: __current_operatingsystem

- name: Operating Systems | Record hidden parameters for vault template
  ansible.builtin.include_tasks: record_hidden_parameters_for_vault.yaml
  vars:
    __record_hidden_results: "{{ __rs_info_list | default([]) }}"
    __record_hidden_vault_fact: satellite_configuration_vault_template_operatingsystem_parameters
    __record_hidden_entity_label: operating system
    __record_hidden_entity_key_format: operatingsystem_flat

- name: Operating Systems | Template Out Results
  when:
    - __rs_info_list is defined
    - __rs_info_list | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_operatingsystems
    info_list: "{{ __rs_info_list | default([]) }}"
...
