---
- name: Products | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}

- name: Products | Get Organizations
  redhat.satellite.organization_info:
    server_url: "{{ satellite.server_url }}"
    username: "{{ satellite.admin.username }}"
    password: "{{ satellite.admin.password }}"
    validate_certs: "{{ satellite.validate_certs }}"
  register: __result_organizations

- name: Products | Get Info
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Products
    api_link: "/katello/api/products?organization_id={{ __current_org.id }}&full_result=true"
  loop: "{{ __result_organizations.organizations }}"
  loop_control:
    loop_var: __current_org
  register: result_api_response

- name: Products | Set Info List
  ansible.builtin.set_fact:
    info_list: "{{ result_api_response.json.results | sort(attribute='id') }}"

- name: Products | Fetch sync plans per organization
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Products sync plans
    api_link: "/katello/api/sync_plans?organization_id={{ __current_org.id }}&per_page=1000"
  loop: "{{ __result_organizations.organizations }}"
  loop_control:
    loop_var: __current_org
  register: __products_sync_plans_api

- name: Products | Build sync plan name lookup by organization
  ansible.builtin.set_fact:
    __product_sync_plan_names: >-
      {{
        (__product_sync_plan_names | default({}))
        | combine({
            __sync_plan_org.name: dict(
              (__sync_plan_result.json.results | default([]))
              | map(attribute='id')
              | zip(__sync_plan_result.json.results | default([]) | map(attribute='name'))
              | list
            )
          })
      }}
  loop: "{{ __products_sync_plans_api.results | default([]) }}"
  loop_control:
    loop_var: __sync_plan_result
    index_var: __sync_plan_org_index
  vars:
    __sync_plan_org: "{{ __result_organizations.organizations[__sync_plan_org_index | int] }}"
  when: __sync_plan_result.json is defined

- name: Products | Enrich products with sync plan names
  ansible.builtin.set_fact:
    __products_info_enriched: "{{ __products_info_enriched | default([]) + [__enriched_product] }}"
  loop: "{{ info_list }}"
  loop_control:
    loop_var: __current_product
    label: "{{ __current_product.name | default(__current_product.id) }}"
  vars:
    __product_org_name: "{{ __current_product.organization.name if (__current_product.organization is mapping) else __current_product.organization }}"
    __enriched_product: >-
      {{
        __current_product
        if not (
          (
            __current_product.sync_plan is mapping
            and __current_product.sync_plan.name is defined
          )
          or (
            __current_product.sync_plan is string
            and __current_product.sync_plan | length > 0
          )
          or (
            __current_product.sync_plan_id is defined
            and __product_sync_plan_names is defined
            and __product_org_name in __product_sync_plan_names
            and (__current_product.sync_plan_id | int) in __product_sync_plan_names[__product_org_name]
          )
        )
        else (
          __current_product | combine(
            {
              'sync_plan': (
                __current_product.sync_plan.name
                if __current_product.sync_plan is mapping
                else __product_sync_plan_names[__product_org_name][__current_product.sync_plan_id | int]
              )
            },
            recursive=True
          )
        )
      }}

- name: Products | Replace info list with enriched products
  ansible.builtin.set_fact:
    info_list: "{{ __products_info_enriched }}"
  when: __products_info_enriched is defined

- name: Products | Template Out Results
  when:
    - info_list is defined
    - info_list | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_products
...
