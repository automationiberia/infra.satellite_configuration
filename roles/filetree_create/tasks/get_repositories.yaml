---
- name: Repositories | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}

- name: Repositories | Get Basic Info
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Repositories
    api_link: /katello/api/repositories?full_result=true

- name: Repositories | Create a List
  ansible.builtin.set_fact:
    all_results: >-
      {{
        result_api_response.json.results
        | sort(attribute='id')
        | rejectattr('url', 'search', satellite_redhat_repository_url_substring)
        | rejectattr('product.orphaned', 'equalto', true)
        | list
      }}

- name: Repositories | Get Detailed Info
  ansible.builtin.include_tasks: detailed_api_call.yaml
  vars:
    call_type: Repositories
    api_link: /katello/api/repositories/
    loop_var: "{{ all_results }}"

- name: Repositories | Template Out Results
  when:
    - detailed_info is defined
    - detailed_info | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_repositories
...
