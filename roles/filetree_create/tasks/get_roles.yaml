---
- name: Roles | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}

- name: Roles | Get Basic Info (index is often thin; name filter in next task)
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Roles
    api_link: /api/roles?per_page=all

- name: Roles | Build name blocklist for built-in / default roles
  ansible.builtin.set_fact:
    __role_name_blocklist: "{{ filetree_create_roles_name_excludes + filetree_create_roles_name_excludes_extra }}"

- name: Roles | Exclude built-in roles by name before detail fetch
  ansible.builtin.set_fact:
    all_results: >-
      {{
        result_api_response.json.results
        | rejectattr('name', 'in', __role_name_blocklist)
        | sort(attribute='id')
      }}

- name: Roles | Get Detailed Info
  when: all_results | length > 0
  ansible.builtin.include_tasks: detailed_api_call.yaml
  vars:
    call_type: Roles
    api_link: /api/roles/
    loop_var: "{{ all_results }}"

- name: Roles | No custom roles to detail
  when: all_results | length == 0
  ansible.builtin.set_fact:
    detailed_info:
      results: []

- name: Roles | Filter detail responses (builtin / locked from full role JSON)
  when: detailed_info.results is defined and detailed_info.results | length > 0
  block:
    - name: Roles | Reset accumulator for detail filter
      ansible.builtin.set_fact:
        __roles_detail_kept: []

    - name: Roles | Accumulate non-builtin unlocked detail responses
      ansible.builtin.set_fact:
        __roles_detail_kept: "{{ __roles_detail_kept + [item] }}"
      loop: "{{ detailed_info.results }}"
      when:
        - item.json is defined
        - item.json.builtin | default(false) not in [true, 1, 2]
        - item.json.locked | default(false) not in [true, 1]

    - name: Roles | Replace detailed_info with filtered list
      ansible.builtin.set_fact:
        detailed_info:
          results: "{{ __roles_detail_kept }}"

- name: Roles | Expand embedded filter stubs (Foreman role show omits permissions/search)
  when: detailed_info.results is defined and detailed_info.results | length > 0
  ansible.builtin.include_tasks: get_roles_expand_filters.yaml

- name: Roles | Template Out Results
  when:
    - detailed_info is defined
    - detailed_info.results is defined
    - detailed_info.results | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_roles
...
