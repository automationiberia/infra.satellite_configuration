---
- name: Roles | Reset the results variable
  ansible.builtin.set_fact:
    result_api_response: {}

- name: Roles | Get Basic Info (index is often thin; name filter in next task)
  ansible.builtin.include_tasks: api_call.yaml
  vars:
    call_type: Roles
    api_link: /api/roles?per_page=all

- name: Roles | Get Detailed Info
  when: result_api_response.json.results | default([]) | length > 0
  ansible.builtin.include_tasks: detailed_api_call.yaml
  vars:
    call_type: Roles
    api_link: /api/roles/
    loop_var: >-
      {{
        result_api_response.json.results
        | rejectattr('name', 'in', filetree_create_roles_name_excludes + filetree_create_roles_name_excludes_extra)
        | sort(attribute='id')
      }}

- name: Roles | No custom roles to detail
  when: result_api_response.json.results | default([]) | length == 0
  ansible.builtin.set_fact:
    detailed_info:
      results: []

- name: Roles | Reset filtered role details
  when: detailed_info.results is defined and detailed_info.results | length > 0
  ansible.builtin.set_fact:
    __filtered_role_results: []

- name: Roles | Append custom non-locked role detail
  ansible.builtin.set_fact:
    __filtered_role_results: "{{ __filtered_role_results + [__role_detail] }}"
  loop: "{{ detailed_info.results }}"
  loop_control:
    loop_var: __role_detail
    label: "{{ __role_detail.json.name | default(__role_detail.item.name | default('unknown')) }}"
  when:
    - detailed_info.results is defined
    - detailed_info.results | length > 0
    - __role_detail.json is defined
    - (__role_detail.json.builtin | default(0) | int) == 0
    - not (__role_detail.json.locked | default(false) | bool)

- name: Roles | Apply filtered role details
  when: detailed_info.results is defined and detailed_info.results | length > 0
  ansible.builtin.set_fact:
    detailed_info:
      results: "{{ __filtered_role_results }}"

- name: Roles | Expand embedded filter stubs (Foreman role show omits permissions/search)
  when: detailed_info.results is defined and detailed_info.results | length > 0
  ansible.builtin.include_tasks: get_roles_expand_filters.yaml

- name: Roles | Template Out Results
  when:
    - detailed_info is defined
    - detailed_info.results is defined
    - detailed_info.results | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_roles
...
