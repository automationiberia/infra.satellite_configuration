---
- name: Settings | Get Basic Info
  redhat.satellite.setting_info:
    server_url: "{{ satellite.server_url }}"
    username: "{{ satellite.admin.username }}"
    password: "{{ satellite.admin.password }}"
    validate_certs: "{{ satellite.validate_certs }}"
  register: __setting_result_api_response

- name: Settings | Set Info List
  ansible.builtin.set_fact:
    info_list: >-
      {{
        __setting_result_api_response.settings
        | rejectattr('readonly', 'equalto', true)
        | rejectattr('readonly', 'equalto', 1)
        | sort(attribute='id')
      }}

- name: Settings | Record encrypted settings for vault template
  when: info_list is defined and info_list | length > 0
  ansible.builtin.set_fact:
    satellite_configuration_vault_template_encrypted_settings: >-
      {{
        (
          info_list
          | rejectattr('name', 'in', satellite_settings_host_specific_names)
          | selectattr('encrypted', 'defined')
          | selectattr('encrypted')
          | map(attribute='name')
          | list
          | default([], true)
        )
        + (
          info_list
          | rejectattr('name', 'in', satellite_settings_host_specific_names)
          | selectattr('value', 'string')
          | selectattr('value', 'match', '^[\*\&\@\!\%]')
          | map(attribute='name')
          | list
          | default([], true)
        )
        | unique
      }}

- name: Settings | Record source hostnames for installation medium path normalization
  when: info_list is defined and info_list | length > 0
  ansible.builtin.set_fact:
    satellite_configuration_export_path_hostnames: >-
      {{
        (
          info_list
          | selectattr('name', 'in', satellite_settings_host_specific_names + ['foreman_url'])
          | map(attribute='value')
          | select('string')
          | select('match', '^https?://')
          | map('regex_replace', '^https?://([^/:]+).*$', '\\1')
          | list
        )
        + [satellite.server_url | urlsplit('hostname')]
        | unique
        | reject('equalto', '')
        | list
      }}

- name: Settings | Template Out Results
  when:
    - info_list is defined
    - info_list | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_settings
...
