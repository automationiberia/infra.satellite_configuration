---
- name: Settings | Get Basic Info
  redhat.satellite.setting_info:
    server_url: "{{ satellite.server_url }}"
    username: "{{ satellite.admin.username }}"
    password: "{{ satellite.admin.password }}"
    validate_certs: "{{ satellite.validate_certs }}"
  register: __setting_result_api_response

- name: Settings | Set Info List
  ansible.builtin.set_fact:
    info_list: >-
      {{
        __setting_result_api_response.settings
        | rejectattr('readonly', 'equalto', true)
        | rejectattr('readonly', 'equalto', 1)
        | sort(attribute='id')
      }}

- name: Settings | Record encrypted settings for vault template
  when: info_list is defined and info_list | length > 0
  ansible.builtin.set_fact:
    satellite_configuration_vault_template_encrypted_settings: >-
      {{
        info_list
        | json_query("[?encrypted == `true` || encrypted == `1`]")
        | map(attribute='name')
        | list
        | default([], true)
      }}

- name: Settings | Template Out Results
  when:
    - info_list is defined
    - info_list | length > 0
  ansible.builtin.include_tasks: template_out.yaml
  vars:
    template_type: satellite_settings
...
