- name: "Block to fix the output files' format"
  tags:
    - yaml_format
  block:
    - name: "Search for all the generated files"
      ansible.builtin.find:
        paths: "{{ output_path }}"
        recurse: true
        patterns:
          - "*.yaml"
          - "*.yml"
      register: _generated_files

    - name: Format the application config file
      infra.satellite_configuration.format_yaml:
        path: "{{ _current_file.path }}"
        explicit_start: true # Forces ---
        explicit_end: true # Forces ...
        preserve_comments: false # Force canonical block-style YAML for lists/dicts.
        auto_block_scalars: true # If a string contains a newline, convert it to a YAML literal block scalar (|).
      loop: "{{ _generated_files.files }}"
      loop_control:
        loop_var: _current_file
        label: "{{ _current_file.path }}"
...
