---
- name: Export Satellite Configuration
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/test_vars.yaml
  tasks:
    - name: Organizations Block
      tags:
        - "organizations"
      block:
        - name: Get Organizations
          ansible.builtin.include_tasks: tasks/get_organizations.yaml

    - name: Locations Block
      tags:
        - "locations"
      block:
        - name: Get Locations
          ansible.builtin.include_tasks: tasks/get_locations.yaml

    - name: Domains Block
      tags:
        - "domains"
      block:
        - name: Get Domains
          ansible.builtin.include_tasks: tasks/get_domains.yaml

    - name: Subnets Block
      tags:
        - "subnets"
      block:
        - name: Get Subnets
          ansible.builtin.include_tasks: tasks/get_subnets.yaml

    - name: Repositories Block
      tags:
        - "repositories"
      block:
        - name: Get Repositories
          ansible.builtin.include_tasks: tasks/get_repositories.yaml

    - name: Repository Sets Block
      tags:
        - "repository_sets"
      block:
        - name: Get Repositories
          ansible.builtin.include_tasks: tasks/get_repository_sets.yaml

    - name: Hostgroups Block
      tags:
        - "hostgroups"
      block:
        - name: Get Host Groups
          ansible.builtin.include_tasks: tasks/get_hostgroups.yaml

    - name: Operating Systems Block
      tags:
        - "operatingsystems"
      block:
        - name: Get Operating Systems
          ansible.builtin.include_tasks: tasks/get_operatingsystems.yaml

    - name: Lifecycle Environments Block
      tags:
        - "lifecycle_environments"
      block:
        - name: Get Lifecycle Environments
          ansible.builtin.include_tasks: tasks/get_lifecycle_environments.yaml

    - name: Content Views Block
      tags:
        - "content_views"
      block:
        - name: Get Content Views
          ansible.builtin.include_tasks: tasks/get_content_views.yaml

    - name: Products Block
      tags:
        - "products"
      block:
        - name: Get Custom Products
          ansible.builtin.include_tasks: tasks/get_products.yaml

    - name: Settings Block
      tags:
        - "settings"
      block:
        - name: Get Settings
          ansible.builtin.include_tasks: tasks/get_settings.yaml

    - name: Content Credentials Block
      tags:
        - "content_credentials"
      block:
        - name: Get Content Credentials
          ansible.builtin.include_tasks: tasks/get_content_credentials.yaml

    - name: Activation Keys Block
      tags:
        - "activation_keys"
      block:
        - name: Get Activation Keys
          ansible.builtin.include_tasks: tasks/get_activation_keys.yaml
...
