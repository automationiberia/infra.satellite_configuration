---
- name: Resolve import Satellite API connection
  ansible.builtin.include_role:
    name: global_vars
    tasks_from: resolve_satellite_target.yaml

- name: "Include Tasks to read the given configuration as code files"
  ansible.builtin.include_tasks: "read_contents.yml"
  args:
    apply:
      tags: "{{ __task_filetree_read.tags }}"
  tags: always
  loop: "{{ satellite_configuration_filetree_read_tasks }}"
  loop_control:
    loop_var: __task_filetree_read
...
