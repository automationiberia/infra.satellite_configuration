---
- name: "Get list of files inside {{ __task_filetree_read.path }}"
  ansible.builtin.find:
    paths: "{{ __task_filetree_read.path }}"
    file_type: file
    patterns: "{{ filetree_satellite_include | default(omit) }}"
    excludes: "{{ filetree_satellite_exclude | default(omit) }}"
    use_regex: "{{ filetree_satellite_regex | default(false) }}"
    contains: "{{ __task_filetree_read.var }}:"
    read_whole_file: true
    recurse: true
  register: __files_list
  no_log: "{{ satellite_configuration_filetree_read_secure_logging and (__task_filetree_read.var in satellite_configuration_sensitive_vars) }}"

- name: "Block to read things when they exists"
  when: __files_list.files | length > 0
  block:
    - name: "Read definitions for {{ __task_filetree_read.name }}"
      when: not (__task_filetree_read.var in satellite_configuration_filetree_read_raw_template_vars)
      ansible.builtin.include_vars:
        file: "{{ __read_definitions_item.path }}"
      loop: "{{ __files_list.files }}"
      loop_control:
        loop_var: __read_definitions_item
        label: "{{ __read_definitions_item.path }}"
      register: __contents_filetree_item
      failed_when: "'VARIABLE IS NOT DEFINED' in __contents_filetree_item"
      no_log: "{{ satellite_configuration_filetree_read_secure_logging and (__task_filetree_read.var in satellite_configuration_sensitive_vars) }}"

    - name: "Read definitions without Jinja templating for {{ __task_filetree_read.name }}"
      when: __task_filetree_read.var in satellite_configuration_filetree_read_raw_template_vars
      ansible.builtin.slurp:
        src: "{{ __read_definitions_item.path }}"
      loop: "{{ __files_list.files }}"
      loop_control:
        loop_var: __read_definitions_item
        label: "{{ __read_definitions_item.path }}"
      register: __contents_filetree_item
      no_log: "{{ satellite_configuration_filetree_read_secure_logging and (__task_filetree_read.var in satellite_configuration_sensitive_vars) }}"

    - name: "Populate list for {{ __task_filetree_read.name }}"
      ansible.builtin.set_fact:
        "__populate_{{ __task_filetree_read.var }}": "{{ (lookup('vars', '__populate_' + __task_filetree_read.var, default=[]) + __populate_list_item.ansible_facts[__task_filetree_read.var])
          }}"
      loop: "{{ __contents_filetree_item.results }}"
      loop_control:
        loop_var: __populate_list_item
        label: "{{ __populate_list_item.ansible_included_var_files | default(__populate_list_item.source | default('')) | join(', ') }}"
      no_log: "{{ satellite_configuration_filetree_read_secure_logging and (__task_filetree_read.var in satellite_configuration_sensitive_vars) }}"
      when:
        - not (__task_filetree_read.var in satellite_configuration_filetree_read_raw_template_vars)
        - __contents_filetree_item is defined
        - __contents_filetree_item.results is defined
        - __contents_filetree_item.results | length > 0
        - __populate_list_item.ansible_facts[__task_filetree_read.var] is defined

    - name: "Populate list from slurped YAML for {{ __task_filetree_read.name }}"
      ansible.builtin.set_fact:
        "__populate_{{ __task_filetree_read.var }}": >-
          {{
            lookup('vars', '__populate_' + __task_filetree_read.var, default=[])
            + (__populate_slurp_item.content | b64decode | from_yaml)[__task_filetree_read.var]
          }}
      loop: "{{ __contents_filetree_item.results }}"
      loop_control:
        loop_var: __populate_slurp_item
        label: "{{ __populate_slurp_item.source | default('') }}"
      no_log: "{{ satellite_configuration_filetree_read_secure_logging and (__task_filetree_read.var in satellite_configuration_sensitive_vars) }}"
      when:
        - __task_filetree_read.var in satellite_configuration_filetree_read_raw_template_vars
        - __contents_filetree_item is defined
        - __contents_filetree_item.results is defined
        - __contents_filetree_item.results | length > 0
        - __populate_slurp_item.content is defined
        - (__populate_slurp_item.content | b64decode | from_yaml)[__task_filetree_read.var] is defined

    - name: "Set Data Structure for {{ __task_filetree_read.name }}"
      ansible.builtin.set_fact:
        "{{ __task_filetree_read.var }}": "{{ lookup('vars', '__populate_' + __task_filetree_read.var) }}"
      no_log: "{{ satellite_configuration_filetree_read_secure_logging and (__task_filetree_read.var in satellite_configuration_sensitive_vars) }}"
      when: lookup('vars', '__populate_' + __task_filetree_read.var) is defined

    - name: "Show loaded information"
      ansible.builtin.debug:
        var: "{{ __task_filetree_read.var }}"
        verbosity: 1
...
